<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Protocol Gateway Web</title>
  <style>
    :root {
      --bg: #08121a;
      --panel: rgba(11, 25, 36, 0.88);
      --panel-soft: rgba(8, 19, 28, 0.92);
      --line: rgba(117, 199, 210, 0.14);
      --text: #e7f3f8;
      --muted: #90a8b3;
      --accent: #79d3db;
      --accent-2: #ffd27d;
      --danger: #ff7f7f;
      --mono: "Cascadia Mono", "Consolas", monospace;
      --sans: "Segoe UI Variable Display", "Segoe UI", sans-serif;
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--sans);
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(121, 211, 219, 0.12), transparent 24%),
        radial-gradient(circle at 90% 12%, rgba(255, 210, 125, 0.12), transparent 18%),
        linear-gradient(145deg, #050b10 0%, #08121a 45%, #0b1721 100%);
    }

    .shell {
      width: min(1160px, calc(100vw - 32px));
      margin: 24px auto;
      padding: 22px;
      border-radius: 28px;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(10, 23, 33, 0.94), rgba(7, 16, 24, 0.9));
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding-bottom: 18px;
      border-bottom: 1px solid rgba(121, 211, 219, 0.12);
    }

    .title-wrap h1 {
      margin: 0;
      font-size: clamp(28px, 5vw, 46px);
      line-height: 1;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .title-wrap p {
      margin: 10px 0 0;
      max-width: 620px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .badge {
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid rgba(121, 211, 219, 0.18);
      background: rgba(121, 211, 219, 0.08);
      color: var(--accent);
      font: 13px var(--mono);
      white-space: nowrap;
    }

    .grid {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 18px;
      margin-top: 20px;
    }

    .card {
      border-radius: 22px;
      border: 1px solid rgba(121, 211, 219, 0.12);
      background: linear-gradient(180deg, var(--panel), var(--panel-soft));
      padding: 18px;
    }

    .card h2 {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 13px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .stack {
      display: grid;
      gap: 12px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    input, select {
      width: 100%;
      border: 1px solid rgba(121, 211, 219, 0.16);
      border-radius: 14px;
      padding: 14px 16px;
      background: rgba(8, 19, 28, 0.96);
      color: var(--text);
      font: 15px var(--mono);
      outline: none;
      transition: border-color .18s ease, transform .18s ease;
    }

    input:focus, select:focus {
      border-color: rgba(121, 211, 219, 0.62);
      transform: translateY(-1px);
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 8px;
    }

    button {
      border: 0;
      border-radius: 14px;
      padding: 13px 18px;
      cursor: pointer;
      font: 700 14px var(--sans);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      transition: transform .18s ease, opacity .18s ease;
    }

    button:hover { transform: translateY(-1px); }
    button:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

    .primary {
      color: #042228;
      background: linear-gradient(135deg, var(--accent), #d6fbff);
    }

    .secondary {
      color: var(--text);
      background: linear-gradient(135deg, rgba(255, 210, 125, 0.88), rgba(255, 165, 104, 0.88));
    }

    .ghost {
      color: var(--text);
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .state {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.04);
      color: var(--muted);
      font: 13px var(--mono);
    }

    .state-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: #6d7f89;
    }

    .state-dot.live {
      background: var(--accent);
      box-shadow: 0 0 0 8px rgba(121, 211, 219, 0.08);
    }

    .status-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .metric, .route {
      padding: 14px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .metric .label, .route-name {
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .metric .value, .route-url {
      font: 13px/1.6 var(--mono);
      word-break: break-all;
    }

    .route-name {
      color: var(--accent-2);
    }

    .routes {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }

    .log-card {
      margin-top: 18px;
    }

    .log-window {
      min-height: 280px;
      max-height: 380px;
      overflow: auto;
      border-radius: 18px;
      padding: 16px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      background: linear-gradient(180deg, rgba(7, 17, 25, 0.96), rgba(4, 10, 14, 0.98));
      color: #c9edf1;
      font: 13px/1.65 var(--mono);
      white-space: pre-wrap;
    }

    .hint, .error {
      margin-top: 8px;
      font-size: 13px;
      line-height: 1.6;
    }

    .hint { color: var(--muted); }
    .error { color: var(--danger); min-height: 20px; }

    @media (max-width: 980px) {
      .grid { grid-template-columns: 1fr; }
      .status-grid { grid-template-columns: 1fr; }
      .topbar { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="topbar">
      <div class="title-wrap">
        <h1>Protocol Gateway Web</h1>
        <p>网页控制台版本。用于配置上游 OpenAI 兼容地址、测试会话请求、启动协议转换代理并查看日志。</p>
      </div>
      <div class="badge" id="controlUrl">CONTROL // --</div>
    </section>

    <section class="grid">
      <div class="card">
        <h2>Connection</h2>
        <div class="stack">
          <div>
            <label for="hostMode">Host Mode</label>
            <select id="hostMode">
              <option value="default">默认拼接 /v1/responses</option>
              <option value="custom">自定义精确地址</option>
            </select>
          </div>
          <div>
            <label for="host">OpenAI Host</label>
            <input id="host" type="text" placeholder="https://api.openai.com" />
          </div>
          <div>
            <label for="key">API Key</label>
            <input id="key" type="password" placeholder="sk-..." />
          </div>
          <div>
            <label for="model">Test Model</label>
            <input id="model" type="text" placeholder="gpt-5.4" />
          </div>
          <div>
            <label for="port">Proxy Port</label>
            <input id="port" type="number" min="1" max="65535" placeholder="例如 3000" />
          </div>
          <div class="state">
            <span class="state-dot" id="stateDot"></span>
            <span id="stateText">等待检测</span>
          </div>
          <div class="button-row">
            <button class="secondary" id="testBtn">检测会话</button>
            <button class="primary" id="startBtn" disabled>启动代理</button>
            <button class="ghost" id="stopBtn">停止代理</button>
          </div>
          <div class="hint" id="hintText">默认模式会自动补成标准 OpenAI Responses 地址；自定义模式会把你填写的地址直接作为最终 Responses 地址。</div>
          <div class="error" id="errorText"></div>
        </div>
      </div>

      <div class="card">
        <h2>Runtime</h2>
        <div class="status-grid">
          <div class="metric">
            <div class="label">Proxy Base</div>
            <div class="value" id="proxyBase">--</div>
          </div>
          <div class="metric">
            <div class="label">Proxy Port</div>
            <div class="value" id="proxyPort">--</div>
          </div>
          <div class="metric">
            <div class="label">Upstream Responses</div>
            <div class="value" id="upstreamUrl">--</div>
          </div>
          <div class="metric">
            <div class="label">Started At</div>
            <div class="value" id="startedAt">--</div>
          </div>
        </div>

        <div class="routes" id="routes"></div>
      </div>
    </section>

    <section class="card log-card">
      <h2>Logs</h2>
      <div class="log-window" id="logWindow"></div>
    </section>
  </main>

  <script>
    const state = {
      tested: false,
      logSource: null
    };

    const hostModeInput = document.getElementById("hostMode");
    const hostInput = document.getElementById("host");
    const keyInput = document.getElementById("key");
    const modelInput = document.getElementById("model");
    const portInput = document.getElementById("port");
    const testBtn = document.getElementById("testBtn");
    const startBtn = document.getElementById("startBtn");
    const stopBtn = document.getElementById("stopBtn");
    const stateText = document.getElementById("stateText");
    const stateDot = document.getElementById("stateDot");
    const errorText = document.getElementById("errorText");
    const hintText = document.getElementById("hintText");
    const controlUrl = document.getElementById("controlUrl");
    const proxyBase = document.getElementById("proxyBase");
    const proxyPort = document.getElementById("proxyPort");
    const upstreamUrl = document.getElementById("upstreamUrl");
    const startedAt = document.getElementById("startedAt");
    const routes = document.getElementById("routes");
    const logWindow = document.getElementById("logWindow");

    function setState(label, live) {
      stateText.textContent = label;
      stateDot.classList.toggle("live", !!live);
    }

    function setError(message) {
      errorText.textContent = message || "";
    }

    function appendLog(line) {
      if (!line) return;
      logWindow.textContent += (logWindow.textContent ? "\n" : "") + line;
      logWindow.scrollTop = logWindow.scrollHeight;
    }

    function renderRoutes(routeList) {
      routes.innerHTML = "";
      if (!routeList || routeList.length === 0) {
        const item = document.createElement("div");
        item.className = "route";
        item.innerHTML = '<div class="route-name">Route</div><div class="route-url">代理尚未启动</div>';
        routes.appendChild(item);
        return;
      }

      routeList.forEach((route) => {
        const item = document.createElement("div");
        item.className = "route";
        item.innerHTML = `
          <div class="route-name">${route.name}</div>
          <div class="route-url">${route.url}</div>
        `;
        routes.appendChild(item);
      });
    }

    function renderStatus(status) {
      controlUrl.textContent = `CONTROL // ${status.control_url || location.origin}`;
      proxyBase.textContent = status.proxy_base_url || "--";
      proxyPort.textContent = status.proxy_port || "--";
      upstreamUrl.textContent = status.upstream_responses_url || "--";
      startedAt.textContent = status.started_at || "--";
      renderRoutes(status.routes || []);
      setState(status.running ? "代理运行中" : "代理未启动", status.running);
    }

    async function fetchJSON(url, options) {
      const response = await fetch(url, {
        headers: { "Content-Type": "application/json" },
        ...options
      });

      let payload = {};
      try {
        payload = await response.json();
      } catch (_) {}

      if (!response.ok) {
        throw new Error(payload.error || `请求失败: ${response.status}`);
      }
      return payload;
    }

    async function loadStatus() {
      const status = await fetchJSON("/api/status", { method: "GET" });
      renderStatus(status);
    }

    async function testConnection() {
      setError("");
      setState("检测中", false);
      testBtn.disabled = true;
      startBtn.disabled = true;

      try {
        const result = await fetchJSON("/api/test-connection", {
          method: "POST",
          body: JSON.stringify({
            host: hostInput.value.trim(),
            key: keyInput.value.trim(),
            model: modelInput.value.trim(),
            host_mode: hostModeInput.value
          })
        });
        state.tested = true;
        hintText.textContent = `检测成功，目标 Responses 地址: ${result.responses_proxy_target}，会话请求: ${result.conversation_checked}`;
        setState("检测成功，可启动代理", false);
        startBtn.disabled = false;
      } catch (error) {
        state.tested = false;
        setError(error.message);
        setState("检测失败", false);
      } finally {
        testBtn.disabled = false;
      }
    }

    async function startProxy() {
      setError("");
      setState("启动中", false);
      startBtn.disabled = true;

      const rawPort = portInput.value.trim();
      const port = rawPort === "" ? 0 : Number(rawPort);

      try {
        const status = await fetchJSON("/api/start", {
          method: "POST",
          body: JSON.stringify({
            host: hostInput.value.trim(),
            key: keyInput.value.trim(),
            port,
            host_mode: hostModeInput.value
          })
        });
        renderStatus(status);
      } catch (error) {
        setError(error.message);
        setState("启动失败", false);
        startBtn.disabled = !state.tested;
      }
    }

    async function stopProxy() {
      setError("");
      try {
        const status = await fetchJSON("/api/stop", {
          method: "POST",
          body: "{}"
        });
        renderStatus(status);
      } catch (error) {
        setError(error.message);
      }
    }

    function attachLogs() {
      if (state.logSource) {
        state.logSource.close();
      }
      state.logSource = new EventSource("/api/logs");
      state.logSource.onmessage = (event) => appendLog(event.data);
      state.logSource.onerror = () => setError("日志流已断开，页面会在下次操作时自动重连。");
    }

    hostModeInput.addEventListener("change", () => {
      state.tested = false;
      startBtn.disabled = true;
      hintText.textContent = hostModeInput.value === "custom"
        ? "自定义模式下，Host 会直接作为最终 Responses 地址使用。"
        : "默认模式会自动补成标准 OpenAI Responses 地址。";
    });

    [hostInput, keyInput, modelInput].forEach((element) => {
      element.addEventListener("input", () => {
        state.tested = false;
        startBtn.disabled = true;
      });
    });

    portInput.addEventListener("input", () => setError(""));
    testBtn.addEventListener("click", testConnection);
    startBtn.addEventListener("click", startProxy);
    stopBtn.addEventListener("click", stopProxy);

    attachLogs();
    loadStatus().catch((error) => setError(error.message));
  </script>
</body>
</html>
